name: Dependabot auto-merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: github.event_name == 'pull_request_target' && github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Label PR for `auto` release bump
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATE_TYPE: ${{ steps.meta.outputs.update-type }}
        run: |
          case "$UPDATE_TYPE" in
            version-update:semver-patch) LABEL=patch ;;
            version-update:semver-minor) LABEL=minor ;;
            version-update:semver-major) echo "Major update; leaving release label for manual review."; exit 0 ;;
            *) echo "No label for update-type '$UPDATE_TYPE'"; exit 0 ;;
          esac
          echo "Applying label: $LABEL"
          gh pr edit "$PR_URL" --add-label "$LABEL"

      - name: Enable auto-merge for patch & minor updates
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "$PR_URL"
